<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Tejavibulya</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', sans-serif;
            color: #1a1a2e;
            background: #ffffff;
            overflow-x: hidden;
        }

        /* ── Scroll Progress ── */
        .scroll-indicator {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 3px;
            background: rgba(0,0,0,0.06); z-index: 1000;
        }
        .scroll-progress {
            height: 100%;
            background: linear-gradient(90deg, #6c63ff, #a78bfa);
            width: 0%; transition: width 0.2s ease;
        }

        /* ── Back to Top ── */
        .back-to-top {
            position: fixed; bottom: 30px; right: 30px;
            width: 48px; height: 48px;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(108,99,255,0.2);
            border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s ease; z-index: 999;
            opacity: 0; transform: translateY(20px);
            box-shadow: 0 4px 20px rgba(108,99,255,0.15);
        }
        .back-to-top.visible { opacity: 1; transform: translateY(0); }
        .back-to-top:hover { background: rgba(108,99,255,0.1); transform: translateY(-3px); }
        .back-to-top svg { width: 18px; height: 18px; fill: #6c63ff; }

        /* ── PIXEL ART ── */
        .pixel-sprite {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        /* inline SVG pixel art via canvas-like approach */
        .pixel-art {
            display: inline-block;
            image-rendering: pixelated;
        }

        /* ── HERO ── */
        .hero {
            height: 100vh;
            background: #ffffff;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; position: relative; overflow: hidden;
        }

        /* Parallax layers */
        .parallax-layer {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }

        /* Floating glass orbs */
        .orb {
            position: absolute; border-radius: 50%;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.6);
        }
        .orb-1 {
            width: 300px; height: 300px;
            top: 10%; left: -8%;
            background: radial-gradient(circle at 30% 30%, rgba(108,99,255,0.12), rgba(167,139,250,0.04));
            box-shadow: inset 0 0 60px rgba(108,99,255,0.08), 0 20px 60px rgba(108,99,255,0.06);
        }
        .orb-2 {
            width: 200px; height: 200px;
            top: 60%; right: 5%;
            background: radial-gradient(circle at 30% 30%, rgba(167,139,250,0.15), rgba(108,99,255,0.04));
            box-shadow: inset 0 0 40px rgba(167,139,250,0.1), 0 15px 40px rgba(167,139,250,0.08);
        }
        .orb-3 {
            width: 150px; height: 150px;
            top: 20%; right: 20%;
            background: radial-gradient(circle at 30% 30%, rgba(196,181,253,0.18), rgba(108,99,255,0.03));
            box-shadow: inset 0 0 30px rgba(196,181,253,0.1), 0 10px 30px rgba(196,181,253,0.07);
        }

        /* Pixel deco elements in hero */
        .hero-pixel-left {
            position: absolute; left: 5%; bottom: 20%;
            animation: pixelFloat 4s ease-in-out infinite;
        }
        .hero-pixel-right {
            position: absolute; right: 8%; top: 25%;
            animation: pixelFloat 5s ease-in-out infinite 1s;
        }
        .hero-pixel-top {
            position: absolute; left: 35%; top: 8%;
            animation: pixelFloat 6s ease-in-out infinite 0.5s;
        }

        @keyframes pixelFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        .hero-content {
            z-index: 2; position: relative;
            animation: fadeInUp 0.9s ease-out;
        }

        .hero h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2.8rem, 6vw, 5.5rem);
            font-weight: 700;
            color: #1a1a2e;
            letter-spacing: -0.03em;
            margin-bottom: 0.3em;
            line-height: 1.1;
        }

        .hero-subtitle {
            font-size: 1rem;
            color: #888;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 3rem;
            font-weight: 400;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Nav pills */
        .nav-menu {
            display: flex; gap: 1rem; flex-wrap: wrap;
            justify-content: center;
            animation: fadeInUp 0.9s ease-out 0.25s both;
        }

        .nav-link {
            color: #1a1a2e;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            padding: 0.6rem 1.4rem;
            border-radius: 50px;
            border: 1px solid rgba(108,99,255,0.2);
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(10px);
            transition: all 0.25s ease;
            box-shadow: 0 2px 12px rgba(108,99,255,0.06);
        }
        .nav-link:hover {
            background: rgba(108,99,255,0.08);
            border-color: rgba(108,99,255,0.4);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(108,99,255,0.12);
        }

        /* ── SECTIONS ── */
        .section {
            min-height: 100vh;
            padding: 7rem 2rem;
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }

        .section-content {
            max-width: 860px; width: 100%;
            position: relative; z-index: 2;
        }

        /* Section label */
        .section-label {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #6c63ff;
            margin-bottom: 1rem;
        }

        .section h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
            line-height: 1.15;
        }

        .section p {
            font-size: 1.05rem;
            line-height: 1.8;
            color: #555;
            max-width: 680px;
        }

        /* Glass card */
        .glass-card {
            background: rgba(255,255,255,0.55);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(108,99,255,0.1);
            border-radius: 24px;
            padding: 3rem 3.5rem;
            box-shadow: 0 8px 40px rgba(108,99,255,0.07),
                        0 2px 8px rgba(0,0,0,0.03);
            position: relative;
        }

        /* Decorative pixel in corner of card */
        .card-pixel {
            position: absolute;
            top: -16px; right: 32px;
        }

        /* ── ABOUT ── */
        .about {
            background: #fafafa;
        }
        .about-bg-orb {
            position: absolute; border-radius: 50%;
            width: 500px; height: 500px;
            top: -100px; right: -150px;
            background: radial-gradient(circle, rgba(108,99,255,0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        /* ── RESEARCH ── */
        .research {
            background: #ffffff;
        }
        .research-bg-orb {
            position: absolute; border-radius: 50%;
            width: 400px; height: 400px;
            bottom: -80px; left: -120px;
            background: radial-gradient(circle, rgba(167,139,250,0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        /* ── PUBLICATIONS ── */
        .publications {
            background: #fafafa;
        }
        .publications-bg-orb {
            position: absolute; border-radius: 50%;
            width: 450px; height: 450px;
            top: 50%; right: -100px;
            transform: translateY(-50%);
            background: radial-gradient(circle, rgba(196,181,253,0.07) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Section pixel accent */
        .section-pixel-right {
            position: absolute; right: 6%; top: 50%;
            transform: translateY(-50%);
            opacity: 0.5;
            pointer-events: none;
        }
        .section-pixel-left {
            position: absolute; left: 4%; top: 50%;
            transform: translateY(-50%);
            opacity: 0.5;
            pointer-events: none;
        }

        /* ── CONTACT ── */
        .contact {
            min-height: 50vh;
            padding: 5rem 2rem;
            background: #ffffff;
            border-top: 1px solid rgba(108,99,255,0.08);
        }

        .contact h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .contact p {
            font-size: 0.95rem;
            color: #888;
            margin-bottom: 2rem;
        }

        .contact-icons {
            display: flex; justify-content: center;
            gap: 1.2rem; margin-top: 1.5rem;
        }

        .contact-icon {
            width: 46px; height: 46px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(108,99,255,0.15);
            border-radius: 14px;
            transition: all 0.25s ease;
            text-decoration: none; color: #333;
            box-shadow: 0 2px 10px rgba(108,99,255,0.06);
        }
        .contact-icon:hover {
            background: rgba(108,99,255,0.07);
            border-color: rgba(108,99,255,0.35);
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(108,99,255,0.12);
        }
        .contact-icon svg { width: 20px; height: 20px; fill: #6c63ff; }

        /* ── Reveal animation ── */
        .reveal {
            opacity: 0; transform: translateY(36px);
            transition: opacity 0.75s ease, transform 0.75s ease;
        }
        .reveal.visible { opacity: 1; transform: translateY(0); }

        /* ── Divider line ── */
        .section-divider {
            width: 48px; height: 3px;
            background: linear-gradient(90deg, #6c63ff, #a78bfa);
            border-radius: 2px;
            margin-bottom: 2rem;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .glass-card { padding: 2rem 1.5rem; }
            .section-pixel-right, .section-pixel-left { display: none; }
            .orb-1 { width: 180px; height: 180px; }
            .orb-2 { display: none; }
            .orb-3 { display: none; }
        }
    </style>
</head>
<body>

<!-- Scroll Progress -->
<div class="scroll-indicator">
    <div class="scroll-progress" id="scrollProgress"></div>
</div>

<!-- Back to Top -->
<button class="back-to-top" id="backToTop" onclick="scrollToTop()">
    <svg viewBox="0 0 24 24"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg>
</button>

<!-- ══ HERO ══ -->
<section class="hero" id="home">

                <rect x="10" y="9" width="1" height="1" fill="#a78bfa" opacity="0.4"/>
            </svg>
        </div>

        <!-- Pixel computer (right) -->
        <div class="hero-pixel-right">
            <svg width="56" height="56" viewBox="0 0 14 14" class="pixel-art" xmlns="http://www.w3.org/2000/svg">
                <rect x="1" y="0" width="12" height="9" fill="#1a1a2e"/>
                <rect x="2" y="1" width="10" height="7" fill="#6c63ff"/>
                <rect x="3" y="2" width="8" height="5" fill="#c4b5fd"/>

                <rect x="2" y="13" width="1" height="1" fill="#ddd"/>

                <rect x="10" y="13" width="1" height="1" fill="#ddd"/>
            </svg>
        </div>
    </div>

    <div class="hero-content">
        <h1>Link Tejavibulya</h1>
        <p class="hero-subtitle">Neuroscience Researcher</p>
        <nav class="nav-menu">
            <a href="#about" class="nav-link">About Me</a>
            <a href="#research" class="nav-link">Research</a>
            <a href="#publications" class="nav-link">Publications</a>

</section>

<script>
    // Scroll progress + back-to-top
    window.addEventListener('scroll', () => {
        const scrollTop = window.pageYOffset;
        const docHeight = document.body.offsetHeight - window.innerHeight;
        document.getElementById('scrollProgress').style.width = (scrollTop / docHeight * 100) + '%';
        const btn = document.getElementById('backToTop');
        scrollTop > 300 ? btn.classList.add('visible') : btn.classList.remove('visible');
    });

    function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

    // Parallax layers
    window.addEventListener('scroll', () => {
        const scrolled = window.pageYOffset;
        document.querySelectorAll('.parallax-layer[data-speed]').forEach(layer => {
            const speed = parseFloat(layer.dataset.speed);
            layer.style.transform = `translateY(${scrolled * speed}px)`;
        });
    });

    // Reveal on scroll
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.12, rootMargin: '0px 0px -60px 0px' });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>
